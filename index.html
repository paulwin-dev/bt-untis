<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Better Untis Web</title>

    <link rel="manifest" href="/manifest.json">

    <link rel="stylesheet" href="./css/root.css">
    <link rel="stylesheet" href="./css/notifications.css">
    <link rel="stylesheet" href="./css/login.css">
    <link rel="stylesheet" href="./css/schedule.css">
    <link rel="stylesheet" href="./css/installer.css">
    <link rel="stylesheet" href="./css/absences.css">
</head>
<body>
    <div id="notifications-screen">
        <template id="notification-template">
            <div class="notification">
                <h1 class="notification-text"></h1>
            </div>
        </template>
    </div>

    <div id="nav-bar">
        <button class="nav-item active" data-tab="schedule">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/>
                <line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
                <line x1="8" y1="14" x2="8" y2="14"/><line x1="12" y1="14" x2="12" y2="14"/>
                <line x1="16" y1="14" x2="16" y2="14"/><line x1="8" y1="18" x2="8" y2="18"/>
                <line x1="12" y1="18" x2="12" y2="18"/>
            </svg>
            <span>Schedule</span>
        </button>
        <button class="nav-item" data-tab="absences">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="9" cy="7" r="4"/><path d="M3 21v-2a4 4 0 0 1 4-4h4"/>
                <line x1="17" y1="17" x2="21" y2="21"/><line x1="21" y1="17" x2="17" y2="21"/>
            </svg>
            <span>Absences</span>
        </button>
        <button class="nav-item" data-tab="grades">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="12 2 22 8 12 14 2 8"/>
                <path d="M6 11v4a5 4 0 0 0 12.5 0v-4"/>
            </svg>
            <span>Grades</span>
        </button>
        <button class="nav-item" data-tab="more">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="5" r="1" fill="currentColor"/>
                <circle cx="12" cy="12" r="1" fill="currentColor"/>
                <circle cx="12" cy="19" r="1" fill="currentColor"/>
            </svg>
            <span>More</span>
        </button>
    </div>
    
    <div id="install-screen" hidden>
        <div id="install-screen-container">
            <h1>
                Better<span style="color: var(--button);">Untis</span> 
                is <span style="text-decoration: underline dotted; color: var(--muted-text);">better</span> 
                in the app!</h1>

            <button type="button" class="general-button" id="install-screen-button">Install Better Untis</button>

            <hr>

            <p id="install-screen-browser">Continue in Browser</p>
        </div>
    </div>

    <div id="login-screen" hidden>
        <div id="login-form">

            <h1 id="login-header">Welcome back.</h1>
            <p class="subtitle">Sign in with your Untis credentials.</p>

            <div class="login-field">
                <label>School URL</label>
                <input type="text" id="login-server" placeholder="yourschool.webuntis.com" autocomplete="off" value="jfk-schule.webuntis.com">
            </div>

            <div class="login-field">
                <label>School Name</label>
                <input type="text" id="login-school" placeholder="" autocomplete="off" value="jfk-schule">
            </div>

            <div class="login-field">
                <label>Username</label>
                <input type="text" id="login-user" placeholder="Username" autocomplete="username">
            </div>

            <div class="login-field">
                <label>Password</label>
                <input type="password" id="login-pass" placeholder="Password" autocomplete="current-password">
            </div>

            <div id="login-remember-container">
                <input type="checkbox" name="remember_me" id="login-remember-check" checked>
                <label for="login-remember-check">Stay logged in</label>
            </div>

            <button id="login-submit" class="general-button" type="button">Login</button>
        </div>
    </div>

    <div id="app-screen">

        <div id="schedule-screen">
            <h1 id="schedule-user">Loading...</h1>

            <div id="schedule">
                <div id="schedule-day-headers"></div>
                <div id="schedule-time-indicator" hidden></div>
                <div id="schedule-grid"></div>
            </div>

            <div id="schedule-details" hidden>
                <button id="schedule-details-close" class="close-button" type="button">✕</button>
                <h1 id="schedule-details-header">Grundkurs Musik</h1>
                <span id="schedule-details-status">Regular</span>
                
                <hr class="schedule-details-divider">
                
                <h3 class="schedule-details-section" id="schedule-details-nfs-header">Notes for Students</h3>
                <p class="schedule-details-text" id="schedule-details-nfs">Some notes go here...</p>
                
                <h3 class="schedule-details-section">Homework</h3>
                <div id="schedule-details-hw-list">
                    <template id="schedule-details-hw-temp">
                        <div class="schedule-details-hw-item">
                            <p class="schedule-details-text schedule-details-hw">Finish Part 1 of the worksheet</p>
                            <button class="close-button complete-homework-button" type="button">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="1 12 5 16 11 8"/><polyline points="9 12 13 16 19 8"/>
                                </svg>
                            </button>
                            <button class="close-button delete-button" type="button">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M3 6h18"/><path d="M8 6V4h8v2"/>
                                    <rect x="5" y="6" width="14" height="16" rx="2"/>
                                    <path d="M10 11v6"/><path d="M14 11v6"/>
                                </svg>
                            </button>
                        </div>
                   </template>
                </div>
                <button type="button" class="general-button" id="schedule-details-add-hw">Add Homework</button>

                <h3 class="schedule-details-section">Own Notes</h3>
                <textarea class="schedule-details-text" id="schedule-details-own-notes" placeholder="Make a note to yourself..."></textarea>
            </div>
        </div>

        <div id="absences-screen" hidden>
            <h1 id="absences-header">Absences</h1>
            <div id="absences-list">
                <template id="absences-item-template">
                    <div class="absence-item">
                        <h2 class="absence-item-title">03.04.2026</h2>
                        <div class="absence-item-data-container">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="12" cy="12" r="10"/>
                                <polyline points="12 6 12 12 16 14"/>
                            </svg>
                            <p class="absence-item-time">12:15 - 13:05</p>
                        </div>
                        <div class="absence-item-data-container">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="12" cy="12" r="10"/>
                                <line x1="12" y1="8" x2="12" y2="8"/>
                                <line x1="12" y1="12" x2="12" y2="16"/>
                            </svg>
                            <p class="absence-item-reason">abwesend</p>
                        </div>
                        <div class="absence-item-data-container">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                                <polyline points="14 2 14 8 20 8"/>
                                <line x1="8" y1="13" x2="16" y2="13"/>
                                <line x1="8" y1="17" x2="16" y2="17"/>
                            </svg>
                            <p class="absence-item-note">BERMUN</p>
                        </div>
                    </div>
                </template>
            </div>
        </div>
    </div>

    <script type="module" src="./js/app.js"></script>
</body>
</html>
